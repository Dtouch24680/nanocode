<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanocode — Sign in</title>
    <link rel="stylesheet" href="/login.css" />
    <style>
      .login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--s-5);
      }
      .login-card {
        width: min(440px, 100%);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: var(--s-6);
        box-shadow: 0 12px 40px rgba(45, 40, 32, 0.08);
      }
      .login-title {
        font-size: var(--text-h2);
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0 0 var(--s-2);
        color: var(--text);
      }
      .login-subtitle {
        font-size: var(--text-body);
        color: var(--text-secondary);
        margin: 0 0 var(--s-5);
        line-height: 1.55;
      }
      .login-step {
        margin: 0 0 var(--s-4);
        padding: var(--s-3);
        background: var(--bg-secondary);
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: var(--text-mono);
        color: var(--text);
      }
      .login-step-prefix {
        color: var(--shore-mid);
        margin-right: 6px;
      }
      .login-step-host {
        color: var(--shore-deep);
      }
      .login-input {
        width: 100%;
        padding: 12px 14px;
        font-size: 18px;
        font-family: var(--font-mono);
        letter-spacing: 0.15em;
        text-align: center;
        text-transform: uppercase;
        border: 1px solid var(--border);
        background: var(--bg-input);
        color: var(--text);
        border-radius: var(--radius-md);
        outline: none;
        transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
      }
      .login-input:focus {
        border-color: var(--border-active);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
      .login-actions {
        display: flex;
        align-items: center;
        gap: var(--s-3);
        margin-top: var(--s-4);
      }
      .login-submit {
        flex: 1;
        height: 42px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font-sans);
        cursor: pointer;
        transition: background var(--duration-fast);
      }
      .login-submit:hover { background: var(--primary-hover); }
      .login-submit:disabled { opacity: 0.5; cursor: default; }
      .login-error {
        margin-top: var(--s-3);
        padding: 10px 14px;
        background: var(--error-bg);
        border: 1px solid rgba(196, 67, 59, 0.18);
        border-radius: var(--radius-md);
        color: var(--text);
        font-size: 13px;
        display: none;
      }
      .login-error.active { display: block; }
      .login-hint {
        margin-top: var(--s-4);
        font-size: var(--text-meta);
        color: var(--text-tertiary);
        line-height: 1.6;
      }
      .login-countdown {
        text-align: center;
        margin-top: var(--s-3);
        font-size: var(--text-meta);
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card" aria-label="Nanocode sign in">
        <h1 class="login-title">Sign in to Nanocode</h1>
        <p class="login-subtitle">
          Nanocode logs you in using your local Linux account — no password sent to the server.
        </p>

        <div class="login-step">
          <span class="login-step-prefix">1.</span>
          SSH to <span class="login-step-host" id="host-name"></span>
        </div>
        <div class="login-step">
          <span class="login-step-prefix">2.</span>
          run <strong>nanocode login</strong>
        </div>
        <div class="login-step">
          <span class="login-step-prefix">3.</span>
          paste the code below ↓
        </div>

        <form id="login-form" autocomplete="off">
          <input
            id="code"
            class="login-input"
            type="text"
            inputmode="text"
            maxlength="9"
            placeholder="XXXX-XXXX"
            aria-label="One-time code"
            spellcheck="false"
            autofocus
          />
          <div class="login-error" id="error"></div>
          <div class="login-countdown" id="countdown"></div>
          <div class="login-actions">
            <button class="login-submit" type="submit" id="submit">Sign in</button>
          </div>
        </form>

        <p class="login-hint">
          Codes are valid for ~60 seconds. Re-run <code>nanocode login</code> to get a fresh one.
        </p>
      </section>
    </main>

    <script>
      document.getElementById('host-name').textContent = location.hostname

      const form = document.getElementById('login-form')
      const codeInput = document.getElementById('code')
      const errorEl = document.getElementById('error')
      const submitBtn = document.getElementById('submit')

      function showError(msg) {
        errorEl.textContent = msg
        errorEl.classList.add('active')
      }
      function clearError() {
        errorEl.textContent = ''
        errorEl.classList.remove('active')
      }

      // Auto-format input as XXXX-XXXX
      codeInput.addEventListener('input', (e) => {
        clearError()
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '')
        if (v.length > 4) v = v.slice(0, 4) + '-' + v.slice(4, 8)
        e.target.value = v
      })

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        clearError()
        const code = codeInput.value.trim().toUpperCase()
        if (!/^[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(code)) {
          showError('Please enter the full XXXX-XXXX code.')
          return
        }
        submitBtn.disabled = true
        submitBtn.textContent = 'Signing in…'
        try {
          const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code }),
            redirect: 'manual',
          })
          if (res.type === 'opaqueredirect' || res.status === 302 || res.ok) {
            location.href = '/'
            return
          }
          const body = await res.json().catch(() => ({}))
          showError(body.error || 'Invalid or expired code.')
        } catch (err) {
          showError('Network error: ' + err.message)
        } finally {
          submitBtn.disabled = false
          submitBtn.textContent = 'Sign in'
        }
      })
    </script>
  </body>
</html>
