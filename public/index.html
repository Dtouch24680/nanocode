<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nanocode</title>

    <script>
      // Apply theme BEFORE the stylesheet paints, so users who prefer
      // dark mode never see a light-mode flash on first load.
      (function () {
        try {
          var t = localStorage.getItem('nanocodeTheme')
          if (t !== 'dark' && t !== 'light') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
          }
          if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark')
        } catch (_) {}
      })()
    </script>
    <link rel="stylesheet" href="/vendor/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/style.css" />

    <script src="/vendor/xterm/lib/xterm.js"></script>
    <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
    <script src="/vendor/xterm-addon-web-links/lib/addon-web-links.js"></script>
    <script src="/vendor/marked/marked.umd.js"></script>
    <script src="/vendor/dompurify/purify.min.js"></script>
    <script src="/vendor/highlight/highlight.min.js"></script>

    <!-- three.js is loaded lazily by glb-viewer.js. The import map
         below lets the bare specifiers `three` and `three/addons/…`
         resolve to the locally-vendored files under /vendor/three/.
         Must precede every <script type="module"> below. -->
    <script type="importmap">
      {
        "imports": {
          "three": "/vendor/three/build/three.module.min.js",
          "three/addons/": "/vendor/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header class="app-header">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <button class="back-to-menu" id="back-to-menu" aria-label="Back to menu" title="Back to menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <h1 class="app-title">Nanocode</h1>
      <div class="header-pills">
        <span class="connection-status" id="status-bash">Bash: disconnected</span>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span class="theme-icon theme-icon-light" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
              <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
            </svg>
          </span>
          <span class="theme-icon theme-icon-dark" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
        </button>
      </div>
    </header>

    <main class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Projects</span>
          <button type="button" class="btn-icon" id="project-add" title="Add project">
            +
          </button>
        </div>
        <div class="sidebar-projects" id="sidebar-projects"></div>
      </aside>

      <div class="main-content">
        <div class="terminal-layout">
          <div class="split-container" id="split-container">
            <div class="pane pane-left">
              <div class="terminal-tab-strip" id="terminal-tab-strip"></div>
              <div class="terminal-stack" id="terminal-stack"></div>
            </div>
            <div class="split-divider" id="split-divider"></div>
            <div class="pane pane-right">
              <div class="explorer-root" id="explorer-root"></div>
            </div>
          </div>

          <div class="mobile-pane-switch" id="mobile-pane-switch">
            <button type="button" class="mobile-pane-btn active" data-pane="left">Terminal</button>
            <button type="button" class="mobile-pane-btn" data-pane="right">Explorer</button>
          </div>

          <div class="chat-input-bar" id="chat-input-bar">
            <div class="touch-toolbar" id="touch-toolbar">
              <button class="touch-btn" data-action="ctrl-c">Ctrl+C</button>
              <button class="touch-btn" data-action="ctrl-l">Clear</button>
              <button class="touch-btn" data-action="arrow-up">&uarr;</button>
              <button class="touch-btn" data-action="arrow-down">&darr;</button>
              <button class="touch-btn" data-action="tab">Tab</button>
              <button class="touch-btn" data-action="escape">Esc</button>
            </div>
            <div class="input-row">
              <div class="active-tab-chip" id="active-tab-chip" role="group" aria-label="Tabs">
                <div class="tab-slot-track" id="tab-slot-track"></div>
              </div>
              <div class="input-wrap">
                <div
                  class="suggestions-dropdown"
                  id="suggestions-dropdown"
                  hidden
                ></div>
                <textarea
                  id="chat-input"
                  class="chat-textarea"
                  placeholder="Type a command..."
                  rows="1"
                  autocomplete="off"
                  spellcheck="false"
                ></textarea>
              </div>
              <button class="send-btn" id="send-btn" aria-label="Send">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="22" y1="2" x2="11" y2="13" />
                  <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <dialog id="add-project-dialog" class="add-project-dialog">
      <form method="dialog" id="add-project-form">
        <h2 class="dialog-title">Add project</h2>
        <label class="dialog-label"
          >Name
          <input
            id="proj-name"
            type="text"
            required
            autocomplete="off"
            placeholder="Project name"
        /></label>
        <label class="dialog-toggle">
          <input type="checkbox" id="proj-remote-toggle" />
          Remote (SSH)
        </label>
        <div id="proj-local-fields">
          <label class="dialog-label" for="proj-cwd">Folder
            <input
              id="proj-cwd"
              type="text"
              autocomplete="off"
              placeholder="/home/you/project or /opt/whatever"
            />
          </label>
          <p class="dialog-hint">Type any absolute path, or browse:</p>
          <div class="folder-browser">
            <div class="folder-breadcrumb" id="folder-breadcrumb"></div>
            <div class="folder-list" id="folder-list"></div>
            <div class="folder-current" id="folder-current"></div>
            <button type="button" id="folder-select-btn" class="btn-secondary">
              Use this folder
            </button>
          </div>
        </div>
        <div id="proj-remote-fields" class="ssh-fields" hidden>
          <label class="dialog-label">Host
            <input id="proj-ssh-host" type="text" autocomplete="off" placeholder="10.0.1.5 or hostname" />
          </label>
          <label class="dialog-label">User
            <input id="proj-ssh-user" type="text" autocomplete="off" placeholder="ubuntu" />
          </label>
          <div class="ssh-row">
            <label class="dialog-label ssh-half">Port
              <input id="proj-ssh-port" type="number" autocomplete="off" placeholder="22" />
            </label>
            <label class="dialog-label ssh-half">Key (optional)
              <input id="proj-ssh-key" type="text" autocomplete="off" placeholder="~/.ssh/id_ed25519" />
            </label>
          </div>
          <label class="dialog-label">Remote directory
            <input id="proj-remote-dir" type="text" autocomplete="off" placeholder="/home/ubuntu/project" />
          </label>
        </div>
        <div class="dialog-actions">
          <button type="button" id="proj-cancel" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Add</button>
        </div>
      </form>
    </dialog>

    <div class="landing-overlay" id="landing-overlay" hidden>
      <div class="landing-container">
        <h1 class="landing-title">Nanocode</h1>
        <div class="landing-grid"></div>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
